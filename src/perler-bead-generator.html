<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片转拼豆图案生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .panel h2 {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 12px;
    }
    .upload-area {
      border: 2px dashed #444;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .upload-area:hover { border-color: #666; }
    .upload-area input { display: none; }
    .settings {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }
    .setting-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .setting-item label { color: #aaa; }
    .setting-item input[type="number"] {
      width: 70px;
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f3460;
      color: #fff;
    }
    .setting-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    #gridDimDisplay {
      color: #4ecca3;
      font-weight: bold;
      margin-left: 4px;
    }
    .preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .preview-box {
      background: #0f3460;
      border-radius: 8px;
      padding: 10px;
    }
    .preview-box h3 {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 10px;
      text-align: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      border-radius: 4px;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #533483; color: #fff; }
    .btn-success { background: #0f9b0f; color: #fff; }
    .progress {
      text-align: center;
      padding: 10px;
      color: #4ecca3;
      display: none;
    }
    .color-info {
      text-align: center;
      padding: 10px;
      color: #aaa;
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧩 图片转拼豆图案生成器</h1>

    <div class="panel">
      <h2>📤 上传图片</h2>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="imageInput" accept="image/*">
        <p>点击或拖拽图片到这里</p>
      </div>
    </div>

    <div class="panel">
      <h2>⚙️ 设置</h2>
      <div class="settings">
        <div class="setting-item">
          <label>最大尺寸:</label>
          <input type="number" id="maxGridSize" value="64" min="16" max="256">
          <span id="gridDimDisplay">64×64</span>
        </div>
        <div class="setting-item">
          <label>显示字母:</label>
          <input type="checkbox" id="showLetter" checked>
        </div>
        <div class="setting-item">
          <label>显示网格:</label>
          <input type="checkbox" id="showGrid" checked>
        </div>
        <div class="setting-item">
          <label>左右对称:</label>
          <input type="checkbox" id="symmetryLR">
        </div>
        <div class="setting-item">
          <label>抖动渲染:</label>
          <input type="checkbox" id="enableDither" checked>
        </div>
        <div class="setting-item">
          <label>边缘保护:</label>
          <input type="checkbox" id="enableEdgeProtect" checked>
        </div>
        <div class="setting-item">
          <label>格子大小:</label>
          <input type="number" id="cellSize" value="16" min="8" max="32">
          <span>px</span>
        </div>
      </div>
      <div class="progress" id="progress">处理中...</div>
      <div class="color-info" id="colorInfo"></div>
    </div>

    <div class="panel">
      <h2>👀 预览</h2>
      <div class="preview-container">
        <div class="preview-box">
          <h3>原图</h3>
          <canvas id="originalCanvas"></canvas>
        </div>
        <div class="preview-box">
          <h3>拼豆图纸</h3>
          <canvas id="beadCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-primary" id="generateBtn">🔄 生成图案</button>
      <button class="btn btn-success" id="downloadPngBtn">📥 下载 PNG</button>
      <button class="btn btn-secondary" id="downloadCsvBtn">📥 下载 CSV</button>
    </div>
  </div>

// Functions
function updateGridDisplay() {
  if (!originalImage) {
    const maxSize = parseInt(maxGridSizeInput.value) || 64;
    gridDimDisplay.textContent = `${maxSize}×${maxSize}`;
    return;
  }
  const maxSize = parseInt(maxGridSizeInput.value) || 64;
  const imgAspect = originalImage.width / originalImage.height;
  let gridW, gridH;
  if (imgAspect >= 1) {
    gridW = maxSize;
    gridH = Math.round(maxSize / imgAspect);
  } else {
    gridH = maxSize;
    gridW = Math.round(maxSize * imgAspect);
  }
  gridDimDisplay.textContent = `${gridW}×${gridH}`;
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      const ctx = originalCanvas.getContext('2d');
      const maxSize = 300;
      const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
      originalCanvas.width = img.width * scale;
      originalCanvas.height = img.height * scale;
      ctx.drawImage(img, 0, 0, originalCanvas.width, originalCanvas.height);
      updateGridDisplay();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Color matching logic (LAB color space)
function rgbToLab(r, g, b) {
  let x = r / 255, y = g / 255, z = b / 255;
  x = x > 0.04045 ? Math.pow((x + 0.055) / 1.055, 2.4) : x / 12.92;
  y = y > 0.04045 ? Math.pow((y + 0.055) / 1.055, 2.4) : y / 12.92;
  z = z > 0.04045 ? Math.pow((z + 0.055) / 1.055, 2.4) : z / 12.92;
  x = (x * 0.4124 + y * 0.3576 + z * 0.1805) / 0.95047;
  y = (x * 0.2126 + y * 0.7152 + z * 0.0722) / 1.00000;
  z = (x * 0.0193 + y * 0.1192 + z * 0.9505) / 1.08883;
  x = x > 0.008856 ? Math.pow(x, 1/3) : (7.787 * x) + 16/116;
  y = y > 0.008856 ? Math.pow(y, 1/3) : (7.787 * y) + 16/116;
  z = z > 0.008856 ? Math.pow(z, 1/3) : (7.787 * z) + 16/116;
  return [(116 * y) - 16, 500 * (x - y), 200 * (y - z)];
}

function colorDistanceLab(r1, g1, b1, r2, g2, b2) {
  const [l1, a1, b1l] = rgbToLab(r1, g1, b1);
  const [l2, a2, b2l] = rgbToLab(r2, g2, b2);
  return Math.sqrt((l1-l2)**2 + (a1-a2)**2 + (b1l-b2l)**2);
}

function findClosestColor(r, g, b) {
  let minDist = Infinity;
  let closest = COLOR_DATABASE[0];
  for (const color of COLOR_DATABASE) {
    const dist = colorDistanceLab(r, g, b, color.rgb[0], color.rgb[1], color.rgb[2]);
    if (dist < minDist) {
      minDist = dist;
      closest = color;
    }
  }
  return closest;
}

function isLightColor(rgb) {
  const [r, g, b] = rgb;
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  return brightness > 128;
}

// Edge detection to protect sharp outlines during dithering
function sobelEdgeDetection(gray, width, height) {
  const edges = new Float32Array(width * height);
  const sobelX = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
  const sobelY = [-1, -2, -1, 0, 0, 0, 1, 2, 1];
  for (let y = 1; y < height - 1; y++) {
    for (let x = 1; x < width - 1; x++) {
      let gx = 0, gy = 0;
      for (let ky = -1; ky <= 1; ky++) {
        for (let kx = -1; kx <= 1; kx++) {
          const idx = (y + ky) * width + (x + kx);
          const kidx = (ky + 1) * 3 + (kx + 1);
          gx += gray[idx] * sobelX[kidx];
          gy += gray[idx] * sobelY[kidx];
        }
      }
      edges[y * width + x] = Math.sqrt(gx * gx + gy * gy);
    }
  }
  return edges;
}

// Optimization: Pre-render color blocks with text into a Sprite Canvas for high performance rendering
function createColorSprites(cellSize, showLetter, dpr) {
  const physicalCellSize = cellSize * dpr;
  const spriteCanvas = document.createElement('canvas');
  spriteCanvas.width = COLOR_DATABASE.length * physicalCellSize;
  spriteCanvas.height = physicalCellSize;
  const sCtx = spriteCanvas.getContext('2d');

  COLOR_DATABASE.forEach((color, index) => {
    const x = index * physicalCellSize;
    // Base Color
    sCtx.fillStyle = color.hex;
    sCtx.fillRect(x, 0, physicalCellSize, physicalCellSize);

    // Overlay Letter
    if (showLetter) {
      sCtx.fillStyle = isLightColor(color.rgb) ? '#000' : '#fff';
      sCtx.font = `bold ${Math.max(8, physicalCellSize * 0.45)}px Arial`;
      sCtx.textAlign = 'center';
      sCtx.textBaseline = 'middle';
      sCtx.fillText(color.id, x + physicalCellSize / 2, physicalCellSize / 2);
    }
  });

  // Return a map to quickly find sprite index by color ID
  const colorIndexMap = new Map(COLOR_DATABASE.map((c, i) => [c.id, i]));
  return { spriteCanvas, physicalCellSize, colorIndexMap };
}

// Central processing function
async function generatePattern() {
  if (!originalImage) {
    alert('请先上传图片');
    return;
  }

  progress.style.display = 'block';
  colorInfo.textContent = '计算中，请稍候...';
  // 释放主线程一帧以更新UI
  await new Promise(r => setTimeout(r, 50)); 

  const maxSize = parseInt(document.getElementById('maxGridSize').value) || 64;
  const cellSize = parseInt(document.getElementById('cellSize').value) || 16;
  const showLetter = document.getElementById('showLetter').checked;
  const showGrid = document.getElementById('showGrid').checked;
  const symmetryLR = document.getElementById('symmetryLR').checked;
  const enableDither = document.getElementById('enableDither').checked;
  const enableEdgeProtect = document.getElementById('enableEdgeProtect').checked;

  const imgAspect = originalImage.width / originalImage.height;
  let gridW, gridH;
  if (imgAspect >= 1) {
    gridW = maxSize;
    gridH = Math.round(maxSize / imgAspect);
  } else {
    gridH = maxSize;
    gridW = Math.round(maxSize * imgAspect);
  }
  if (symmetryLR) gridW = Math.max(gridW, Math.ceil(gridW / 2) * 2);
  gridDimDisplay.textContent = `${gridW}×${gridH}`;

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = gridW;
  tempCanvas.height = gridH;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(originalImage, 0, 0, gridW, gridH);
  
  const imageData = tempCtx.getImageData(0, 0, gridW, gridH);
  const originalPixels = imageData.data;

  // 优化点：使用独立的 Float32Array 存储带误差的像素数据，防止 uint8 过早截断导致误差丢失
  const floatPixels = new Float32Array(originalPixels.length);
  for (let i = 0; i < originalPixels.length; i++) {
    floatPixels[i] = originalPixels[i];
  }

  let edgeMap = null;
  if (enableEdgeProtect && enableDither) {
    const gray = new Uint8Array(gridW * gridH);
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const i = (y * gridW + x) * 4;
        // 计算边缘时严格使用原始像素，不会被抖动误差污染
        gray[y * gridW + x] = Math.round(originalPixels[i] * 0.299 + originalPixels[i+1] * 0.587 + originalPixels[i+2] * 0.114);
      }
    }
    edgeMap = sobelEdgeDetection(gray, gridW, gridH);
    const maxEdge = Math.max(...edgeMap);
    if (maxEdge > 0) {
      for (let i = 0; i < edgeMap.length; i++) edgeMap[i] = edgeMap[i] / maxEdge;
    }
  }

  beadPatternData = [];
  const colorCounts = {};
  const totalDisplayPixels = symmetryLR ? Math.ceil(gridW / 2) * gridH : gridW * gridH;

  // 主循环：抖动计算与颜色匹配
  for (let y = 0; y < gridH; y++) {
    const row = [];
    for (let x = 0; x < gridW; x++) {
      let srcX = x;
      if (symmetryLR && x >= gridW / 2) {
        srcX = gridW - 1 - x;
      }
      
      const i = (y * gridW + srcX) * 4;
      
      // 读取带有抖动误差的当前像素值，限制在 0-255 之间
      const curR = Math.max(0, Math.min(255, floatPixels[i]));
      const curG = Math.max(0, Math.min(255, floatPixels[i + 1]));
      const curB = Math.max(0, Math.min(255, floatPixels[i + 2]));

      const closestColor = findClosestColor(curR, curG, curB);
      row.push(closestColor);
      
      if (!symmetryLR || x < Math.ceil(gridW / 2)) {
          colorCounts[closestColor.id] = (colorCounts[closestColor.id] || 0) + 1;
      }

      if (enableDither) {
        const errR = curR - closestColor.rgb[0];
        const errG = curG - closestColor.rgb[1];
        const errB = curB - closestColor.rgb[2];

        // 边缘保护因子映射
        const edgeFactor = edgeMap ? Math.max(0, 1 - edgeMap[y * gridW + srcX] * 2) : 1;

        const diffuse = (nx, ny, w) => {
          if (nx < 0 || nx >= gridW || ny < 0 || ny >= gridH) return;
          const ni = (ny * gridW + nx) * 4;
          const factor = edgeMap ? Math.max(0, 1 - edgeMap[ny * gridW + nx] * 2) : 1;
          const finalW = w * edgeFactor * factor;
          
          // 误差扩散至 floatPixels 缓冲区，不直接修改原始图片数据
          floatPixels[ni] += errR * finalW;
          floatPixels[ni + 1] += errG * finalW;
          floatPixels[ni + 2] += errB * finalW;
        };

        diffuse(srcX + 1, y, 7/16);
        diffuse(srcX - 1, y + 1, 3/16);
        diffuse(srcX, y + 1, 5/16);
        diffuse(srcX + 1, y + 1, 1/16);
      }
    }
    // 对称模式下，右半边直接复制左半边生成的颜色
    if (symmetryLR) {
       for (let x = Math.ceil(gridW / 2); x < gridW; x++) {
          row[x] = row[gridW - 1 - x];
       }
    }
    beadPatternData.push(row);
  }

  // 优化点：高清屏适配与高性能渲染
  renderBeadPattern(gridW, gridH, cellSize, showGrid, showLetter);

  // 渲染统计信息
  const uniqueColors = Object.keys(colorCounts).length;
  const usedColors = Object.entries(colorCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([id, count]) => `<span style="margin-right:8px; display:inline-block;"><b>${id}</b>: ${count}颗</span>`)
    .join('');

  colorInfo.innerHTML = `<span>网格: ${gridW}×${gridH} | 使用颜色: ${uniqueColors}种 | 共需: ${totalDisplayPixels}颗豆子</span><br><br>${usedColors}`;
  progress.style.display = 'none';
}

// 独立的渲染函数：利用精灵图技术提升绘制速度
function renderBeadPattern(gridW, gridH, cellSize, showGrid, showLetter) {
  const dpr = window.devicePixelRatio || 1;
  
  // 按照设备的物理分辨率放大 Canvas，防止图形模糊
  beadCanvas.width = gridW * cellSize * dpr;
  beadCanvas.height = gridH * cellSize * dpr;
  // CSS 控制其实际显示尺寸
  beadCanvas.style.width = `${gridW * cellSize}px`;
  beadCanvas.style.height = `${gridH * cellSize}px`;

  const ctx = beadCanvas.getContext('2d');
  
  // 铺设白色背景
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, beadCanvas.width, beadCanvas.height);

  // 获取离屏渲染的 Sprite 图，极大降低 fillText 的性能损耗
  const { spriteCanvas, physicalCellSize, colorIndexMap } = createColorSprites(cellSize, showLetter, dpr);

  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const color = beadPatternData[y][x];
      const spriteIdx = colorIndexMap.get(color.id);
      
      const targetX = x * cellSize * dpr;
      const targetY = y * cellSize * dpr;

      // 使用 drawImage 切片贴图，代替原来缓慢的 fillRect + fillText
      ctx.drawImage(
        spriteCanvas, 
        spriteIdx * physicalCellSize, 0, physicalCellSize, physicalCellSize, // 源裁剪区
        targetX, targetY, physicalCellSize, physicalCellSize // 目标绘制区
      );

      if (showGrid) {
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = Math.max(1, 0.5 * dpr);
        ctx.strokeRect(targetX, targetY, physicalCellSize, physicalCellSize);
      }
    }
  }
}

function downloadPNG() {
  if (!beadCanvas.width) {
    alert('请先生成图案');
    return;
  }
  const link = document.createElement('a');
  link.download = 'perler-bead-pattern.png';
  link.href = beadCanvas.toDataURL('image/png');
  link.click();
}

function downloadCSV() {
  if (!beadPatternData.length) {
    alert('请先生成图案');
    return;
  }
  const gridH = beadPatternData.length;
  const gridW = beadPatternData[0].length;
  let csv = 'y\\x';
  for (let x = 0; x < gridW; x++) csv += `,${x}`;
  csv += '\n';
  for (let y = 0; y < gridH; y++) {
    csv += y;
    for (let x = 0; x < gridW; x++) {
      csv += `,${beadPatternData[y][x].id}`;
    }
    csv += '\n';
  }
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const link = document.createElement('a');
  link.download = 'perler-bead-pattern.csv';
  link.href = URL.createObjectURL(blob);
  link.click();
}
